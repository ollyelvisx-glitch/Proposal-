<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Kimmy Babes 💖</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffe5ec, #ffc2d1);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            text-align: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.9);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            max-width: 420px;
            width: 90%;
            transition: all 0.5s ease;
        }

        h1, h2 {
            color: #ff4d6d;
            margin-bottom: 1.5rem;
        }

        h1 { font-size: 2rem; }
        h2 { font-size: 1.6rem; }

        .gif-container img {
            width: 140px;
            height: 140px;
            margin-bottom: 1.5rem;
        }

        /* Password Form Styling */
        .input-group {
            margin-bottom: 1.5rem;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 20px;
            border: 2px solid #ffb3c1;
            border-radius: 50px;
            font-size: 1rem;
            text-align: center;
            outline: none;
            transition: border 0.3s;
        }

        input[type="text"]:focus {
            border-color: #ff4d6d;
        }

        .error-msg {
            color: #d90429;
            font-size: 0.9rem;
            margin-top: 0.5rem;
            min-height: 20px;
        }

        /* Button Container & Buttons */
        .btn-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 2rem;
            position: relative;
            height: 50px;
        }

        button {
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: background-color 0.3s, transform 0.1s ease;
        }

        .submit-btn {
            background-color: #ff4d6d;
            color: white;
            width: 100%;
        }

        #yes-btn {
            background-color: #ff4d6d;
            color: white;
        }

        #yes-btn:hover, .submit-btn:hover {
            background-color: #ff758f;
            transform: scale(1.03);
        }

        #no-btn {
            background-color: #6c757d;
            color: white;
            position: absolute;
            left: 55%;
        }

        /* Visibility States */
        .hidden {
            display: none !important;
        }

        .success-message {
            color: #ff4d6d;
            font-size: 1.25rem;
            font-weight: bold;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="lock-screen">
            <h2>Enter name as Key 🔒</h2>
            <p style="color: #666; margin-bottom: 1.5rem;">Hint: Your nickname given by me</p>
            <div class="input-group">
                <input type="text" id="password-input" placeholder="Type password here...">
                <div id="error-text" class="error-msg"></div>
            </div>
            <button class="submit-btn" id="login-btn">Unlock</button>
        </div>

        <div id="proposal-screen" class="hidden">
        
            <h1>Will you be mine K.Shan🫣🤭💖</h1>
            <div class="btn-container">
                <button id="yes-btn">Yes</button>
                <button id="no-btn">No</button>
            </div>
        </div>

        <div id="success-screen" class="hidden">
        
            <p class="success-message">I’ll always protect and respect you. ✨</p>
            <p class="success-message" style="margin-top: 1rem; font-weight: normal; font-size: 1.1rem; color: #cc4466;">
                I’ll always treat and love u 🥰 if your also willing to not let me down💋🎶🎼atte rate ma proposal😂😩♾️💵
            </p>
        </div>
    </div>

    <script>
        // DOM Elements
        const lockScreen = document.getElementById('lock-screen');
        const proposalScreen = document.getElementById('proposal-screen');
        const successScreen = document.getElementById('success-screen');
        
        const passwordInput = document.getElementById('password-input');
        const loginBtn = document.getElementById('login-btn');
        const errorText = document.getElementById('error-text');
        
        const noBtn = document.getElementById('no-btn');
        const yesBtn = document.getElementById('yes-btn');

        // Step 1: Login Verification
        loginBtn.addEventListener('click', checkPassword);
        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkPassword();
        });

        function checkPassword() {
            const userInput = passwordInput.value.trim();
            
            // Checking exact text match "Kimmy Babes"
            if (userInput === "Kimmy") {
                lockScreen.classList.add('hidden');
                proposalScreen.classList.remove('hidden');
            } else {
                errorText.textContent = "Incorrect password! Try again close one. 🥺";
                passwordInput.value = "";
            }
        }

        // Step 2: The Elusive "No" Button
        function moveNoButton() {
            const padding = 60;
            // Get screen boundaries so the button doesn't jump off layout entirely
            const maxX = window.innerWidth - noBtn.offsetWidth - padding;
            const maxY = window.innerHeight - noBtn.offsetHeight - padding;

            const randomX = Math.max(padding, Math.floor(Math.random() * maxX));
            const randomY = Math.max(padding, Math.floor(Math.random() * maxY));

            noBtn.style.position = 'fixed';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        // Handles Desktop (Mouse hover)
        noBtn.addEventListener('mouseover', moveNoButton);

        // Handles Mobile Devices (Taps/Touches)
        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault(); // Stop mobile click execution
            moveNoButton();
        });

        // Step 3: Landing the "Yes"
        yesBtn.addEventListener('click', () => {
            proposalScreen.classList.add('hidden');
            successScreen.classList.remove('hidden');
        });
    </script>
</body>
</html>
